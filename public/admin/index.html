<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GAIN Admin | Green Africa Investment Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fc;
        }

        /* Login */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #eef2f0;
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px; /* Prevents zoom on mobile */
        }

        .input-group input:focus {
            outline: none;
            border-color: #00e676;
        }

        .btn-primary {
            width: 100%;
            background: #0a2e24;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:active {
            background: #144d3e;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #eef2f0;
            color: #0a2e24;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        /* Admin Container */
        .admin-container {
            display: none;
            max-width: 600px; /* Mobile-first max width */
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        /* Header */
        .admin-header {
            background: white;
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eef2f0;
        }

        .admin-header h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .admin-header p {
            font-size: 11px;
            margin-top: 2px;
        }

        .logout-btn {
            background: #eef2f0;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        /* Stats - Mobile optimized: 2 columns */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #eef2f0;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #0a2e24;
            word-break: break-word;
        }

        .stat-label {
            font-size: 12px;
            color: #6c7a73;
            margin-top: 6px;
        }

        /* Bottom Navigation - Mobile optimized */
        .mobile-bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #eef2f0;
            padding: 8px 12px;
            padding-bottom: env(safe-area-inset-bottom, 12px);
            display: flex;
            justify-content: space-around;
            z-index: 100;
            box-shadow: 0 -2px 20px rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.2s;
            flex: 1;
            max-width: 80px;
        }

        .nav-item:active {
            background: #eef2f0;
            transform: scale(0.96);
        }

        .nav-icon {
            font-size: 22px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
            color: #6c7a73;
        }

        .nav-item.active .nav-label {
            color: #00e676;
            font-weight: 600;
        }

        .nav-item.active .nav-icon {
            filter: drop-shadow(0 0 2px #00e676);
        }

        /* Hide old tabs on mobile */
        .admin-tabs {
            display: none;
        }

        /* Panels */
        .panel {
            display: none;
            margin-top: 0;
        }

        .panel.active-panel {
            display: block;
        }

        /* Create Project Card - Mobile optimized */
        .create-project-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #eef2f0;
        }

        .create-project-card h3 {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
        }

        /* Mobile: forms stack vertically */
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            background: white;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00e676;
        }

        /* Mobile Card Lists (replaces tables) */
        .mobile-card-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #eef2f0;
        }

        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .project-card-title {
            font-weight: 700;
            font-size: 16px;
            flex: 1;
        }

        .project-card-image {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            background: #eef2f0;
            margin-left: 12px;
        }

        .project-card-details {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
            color: #4a5568;
        }

        .project-card-detail {
            background: #f8f9fc;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .project-card-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .project-card-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        /* Tables hidden on mobile */
        .desktop-table {
            display: none;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-pending { background: #fef3c7; color: #d97706; }
        .badge-active { background: #e8f5e9; color: #2e7d32; }
        .badge-verified { background: #e8f5e9; color: #00e676; }

        .btn-approve {
            background: #00e676;
            color: #0a2e24;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-reject {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            padding: 14px 20px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast.success { background: #00e676; color: #0a2e24; }
        .toast.error { background: #e74c3c; }

        .image-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c7a73;
            background: white;
            border-radius: 20px;
        }

        /* Loading indicator */
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c7a73;
        }

        /* KYC and User cards */
        .kyc-card, .user-card, .investment-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #eef2f0;
            margin-bottom: 12px;
        }

        .kyc-card-row, .user-card-row, .investment-card-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .kyc-label, .user-label, .investment-label {
            color: #6c7a73;
            font-weight: 500;
        }

        .kyc-value, .user-value, .investment-value {
            color: #1a2e24;
            font-weight: 500;
            text-align: right;
            word-break: break-word;
            max-width: 60%;
        }

        /* Desktop breakpoint */
        @media (min-width: 768px) {
            .admin-container {
                max-width: 1200px;
                padding: 24px;
                padding-bottom: 24px;
            }

            .mobile-bottom-nav {
                display: none;
            }

            .admin-tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 24px;
                background: white;
                padding: 8px;
                border-radius: 60px;
                border: 1px solid #eef2f0;
                flex-wrap: wrap;
            }

            .admin-tab {
                padding: 10px 24px;
                border: none;
                background: none;
                cursor: pointer;
                border-radius: 40px;
                font-size: 14px;
                font-weight: 500;
                transition: all 0.2s;
            }

            .admin-tab.active {
                background: #0a2e24;
                color: white;
            }

            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }

            .stat-value {
                font-size: 32px;
            }

            .form-row {
                flex-direction: row;
                gap: 16px;
            }

            .form-row .form-group {
                flex: 1;
            }

            .desktop-table {
                display: block;
                background: white;
                border-radius: 20px;
                overflow-x: auto;
                border: 1px solid #eef2f0;
            }

            .mobile-card-list {
                display: none;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                min-width: 600px;
            }

            th, td {
                padding: 14px 16px;
                text-align: left;
                border-bottom: 1px solid #eef2f0;
            }

            th {
                background: #f8f9fc;
                font-weight: 600;
                font-size: 13px;
                color: #4a5568;
            }

            td {
                font-size: 13px;
            }

            .toast {
                bottom: 20px;
                left: auto;
                right: 20px;
                max-width: 380px;
            }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h1>🔐 GAIN Admin</h1>
            <p style="color: #6c7a73; margin-bottom: 24px;">Green Africa Investment Network</p>
            <div class="input-group">
                <input type="email" id="admin-email" placeholder="Email" value="admin@ener2crowd.africa">
            </div>
            <div class="input-group">
                <input type="password" id="admin-password" placeholder="Password" value="Admin123!">
            </div>
            <button class="btn-primary" onclick="adminLogin()">Log in</button>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="admin-container">
        <div class="admin-header">
            <div>
                <h1>🌍 GAIN Admin</h1>
                <p>Green Africa Investment Network</p>
            </div>
            <button class="logout-btn" onclick="adminLogout()">Sign out</button>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-users">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-projects">0</div>
                <div class="stat-label">Projects</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-investments">KES 0</div>
                <div class="stat-label">Total Invested</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-pending">0</div>
                <div class="stat-label">Pending KYC</div>
            </div>
        </div>

        <!-- Desktop Tabs (hidden on mobile) -->
        <div class="admin-tabs">
            <button class="admin-tab" onclick="switchDesktopTab('create')">➕ Create</button>
            <button class="admin-tab active" onclick="switchDesktopTab('pending')">⏳ Pending (<span id="pending-count">0</span>)</button>
            <button class="admin-tab" onclick="switchDesktopTab('active')">✅ Active</button>
            <button class="admin-tab" onclick="switchDesktopTab('kyc')">🪪 KYC</button>
            <button class="admin-tab" onclick="switchDesktopTab('users')">👥 Users</button>
            <button class="admin-tab" onclick="switchDesktopTab('investments')">💰 Investments</button>
        </div>

        <!-- Panels -->
        <!-- Create Project Panel -->
        <div id="create-panel" class="panel">
            <div class="create-project-card">
                <h3>➕ Create New Climate Project</h3>
                
                <div class="form-group">
                    <label>Project Title *</label>
                    <input type="text" id="project-title" placeholder="e.g., Nairobi Solar Park">
                </div>
                
                <div class="form-group">
                    <label>Sector *</label>
                    <select id="project-sector">
                        <option value="solar">☀️ Solar Energy</option>
                        <option value="e-mobility">⚡ E-Mobility</option>
                        <option value="green-hydrogen">💧 Green Hydrogen</option>
                        <option value="carbon-credits">🌿 Carbon Credits</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="project-description" rows="3" placeholder="Describe the project's impact and goals..."></textarea>
                </div>

                <div class="form-group">
                    <label>Project Image URL</label>
                    <input type="text" id="project-image" placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>GAIN Score</label>
                        <select id="project-gain-score">
                            <option value="AAA">AAA - Highest</option>
                            <option value="AA+">AA+ - Very High</option>
                            <option value="AA">AA - High</option>
                            <option value="A+">A+ - Good</option>
                            <option value="A" selected>A - Above Avg</option>
                            <option value="BBB">BBB - Average</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Expected Return (%) *</label>
                        <input type="number" id="project-return" placeholder="14" value="12">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Goal Amount (KES) *</label>
                        <input type="number" id="project-goal" placeholder="5,000,000">
                    </div>
                    <div class="form-group">
                        <label>Duration (months)</label>
                        <input type="number" id="project-duration" placeholder="36" value="36">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="project-location" placeholder="Nairobi, Kenya" value="Kenya">
                    </div>
                    <div class="form-group">
                        <label>Developer Name</label>
                        <input type="text" id="project-developer" placeholder="Company name">
                    </div>
                </div>

                <button class="btn-primary" onclick="createProjectFromAdmin()">Create Project</button>
                <div id="create-status" style="margin-top: 16px;"></div>
            </div>
        </div>

        <!-- Pending Projects Panel -->
        <div id="pending-panel" class="panel active-panel">
            <div class="mobile-card-list" id="pending-mobile-list"></div>
            <div class="desktop-table" id="pending-desktop-table"></div>
        </div>

        <!-- Active Projects Panel -->
        <div id="active-panel" class="panel">
            <div class="mobile-card-list" id="active-mobile-list"></div>
            <div class="desktop-table" id="active-desktop-table"></div>
        </div>

        <!-- KYC Panel -->
        <div id="kyc-panel" class="panel">
            <div id="kyc-mobile-list"></div>
            <div class="desktop-table" id="kyc-desktop-table"></div>
        </div>

        <!-- Users Panel -->
        <div id="users-panel" class="panel">
            <div id="users-mobile-list"></div>
            <div class="desktop-table" id="users-desktop-table"></div>
        </div>

        <!-- Investments Panel -->
        <div id="investments-panel" class="panel">
            <div id="investments-mobile-list"></div>
            <div class="desktop-table" id="investments-desktop-table"></div>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <div class="mobile-bottom-nav" id="mobile-bottom-nav" style="display: none;">
        <button class="nav-item" data-panel="create">
            <span class="nav-icon">➕</span>
            <span class="nav-label">Create</span>
        </button>
        <button class="nav-item active" data-panel="pending">
            <span class="nav-icon">⏳</span>
            <span class="nav-label">Pending</span>
        </button>
        <button class="nav-item" data-panel="active">
            <span class="nav-icon">✅</span>
            <span class="nav-label">Active</span>
        </button>
        <button class="nav-item" data-panel="kyc">
            <span class="nav-icon">🪪</span>
            <span class="nav-label">KYC</span>
        </button>
        <button class="nav-item" data-panel="users">
            <span class="nav-icon">👥</span>
            <span class="nav-label">Users</span>
        </button>
        <button class="nav-item" data-panel="investments">
            <span class="nav-icon">💰</span>
            <span class="nav-label">Invest</span>
        </button>
    </div>

    <script>
        const API_URL = 'https://green-ztje.onrender.com/api';
        let adminToken = null;

        const savedToken = localStorage.getItem('adminToken');
        if (savedToken) { adminToken = savedToken; loadDashboard(); }

        // Mobile navigation
        function initMobileNav() {
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const panelName = item.dataset.panel;
                    switchMobilePanel(panelName);
                    
                    navItems.forEach(nav => nav.classList.remove('active'));
                    item.classList.add('active');
                });
            });
        }

        function switchMobilePanel(panelName) {
            const panels = ['create', 'pending', 'active', 'kyc', 'users', 'investments'];
            panels.forEach(p => {
                const panel = document.getElementById(`${p}-panel`);
                if (panel) panel.classList.remove('active-panel');
            });
            document.getElementById(`${panelName}-panel`).classList.add('active-panel');
        }

        function switchDesktopTab(tabName) {
            // Update active state on tabs
            document.querySelectorAll('.admin-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Hide all panels
            const panels = ['create', 'pending', 'active', 'kyc', 'users', 'investments'];
            panels.forEach(p => {
                document.getElementById(`${p}-panel`).classList.remove('active-panel');
            });
            
            // Show selected panel
            document.getElementById(`${tabName}-panel`).classList.add('active-panel');
        }

        async function adminLogin() {
            const email = document.getElementById('admin-email').value;
            const password = document.getElementById('admin-password').value;
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success && data.user.role === 'admin') {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', data.token);
                    showToast('Login successful', 'success');
                    loadDashboard();
                } else { showToast('Admin access required', 'error'); }
            } catch(e) { showToast('Connection error', 'error'); }
        }

        async function loadDashboard() {
            if (!adminToken) {
                showLogin();
                return;
            }
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            document.getElementById('mobile-bottom-nav').style.display = 'flex';
            
            // Initialize mobile nav
            initMobileNav();
            
            try {
                await loadStats();
                await loadProjects();
                await loadKYC();
                await loadUsers();
                await loadInvestments();
            } catch (error) {
                console.error('Dashboard load error:', error);
                showToast('Session expired. Please login again.', 'error');
                adminLogout();
            }
        }

        function showLogin() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('admin-dashboard').style.display = 'none';
            document.getElementById('mobile-bottom-nav').style.display = 'none';
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                if (res.status === 401) {
                    adminLogout();
                    return;
                }
                
                const data = await res.json();
                if (data.success) {
                    document.getElementById('stat-users').innerText = data.stats.totalUsers;
                    document.getElementById('stat-projects').innerText = data.stats.totalProjects;
                    document.getElementById('stat-investments').innerHTML = `KES ${data.stats.totalInvestments.toLocaleString()}`;
                    document.getElementById('stat-pending').innerText = data.stats.pendingKYC;
                }
            } catch(e) { 
                console.error('Stats error:', e);
            }
        }

        async function createProjectFromAdmin() {
            const title = document.getElementById('project-title').value;
            const description = document.getElementById('project-description').value;
            const sector = document.getElementById('project-sector').value;
            const imageUrl = document.getElementById('project-image').value;
            const gainScore = document.getElementById('project-gain-score').value;
            const goalAmount = parseInt(document.getElementById('project-goal').value);
            const expectedReturnPercent = parseInt(document.getElementById('project-return').value);
            const duration = document.getElementById('project-duration').value;
            const location = document.getElementById('project-location').value;
            const developerName = document.getElementById('project-developer').value;
            
            if (!title || !description || !goalAmount) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/projects`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({
                        title,
                        description,
                        sector,
                        goalAmount,
                        expectedReturnPercent,
                        imageUrl: imageUrl || null,
                        gainScore: gainScore,
                        duration: duration,
                        location: location || 'Kenya',
                        developerName: developerName || 'GAIN Admin',
                        developerEmail: 'admin@ener2crowd.africa',
                        deadline: new Date(Date.now() + 365 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showToast('Project created! Pending approval.', 'success');
                    document.getElementById('project-title').value = '';
                    document.getElementById('project-description').value = '';
                    document.getElementById('project-image').value = '';
                    document.getElementById('project-goal').value = '';
                    document.getElementById('project-return').value = '12';
                    document.getElementById('project-duration').value = '36';
                    document.getElementById('project-location').value = 'Kenya';
                    document.getElementById('project-developer').value = '';
                    await loadProjects();
                    await loadStats();
                } else { 
                    showToast('Error: ' + data.error, 'error');
                }
            } catch(e) { 
                showToast('Failed to create project', 'error'); 
            }
        }

        async function approveProject(id) {
            const res = await fetch(`${API_URL}/projects/${id}/approve`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                showToast('✅ Project approved and visible to users!', 'success');
                await loadProjects();
                await loadStats();
            } else { showToast('Failed to approve', 'error'); }
        }

        async function rejectProject(id) {
            const res = await fetch(`${API_URL}/projects/${id}/reject`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                showToast('❌ Project rejected', 'success');
                await loadProjects();
            } else { showToast('Failed to reject', 'error'); }
        }

        async function approveKYC(id) {
            const res = await fetch(`${API_URL}/kyc/approve/${id}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                showToast('✓ KYC approved', 'success');
                await loadKYC();
                await loadStats();
            } else { showToast('Failed to approve KYC', 'error'); }
        }

        async function rejectKYC(id) {
            const res = await fetch(`${API_URL}/kyc/reject/${id}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const data = await res.json();
            if (data.success) {
                showToast('✗ KYC rejected', 'success');
                await loadKYC();
            } else { showToast('Failed to reject KYC', 'error'); }
        }

        function adminLogout() {
            localStorage.removeItem('adminToken');
            adminToken = null;
            showLogin();
            showToast('Signed out', 'success');
        }

        function showToast(msg, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
