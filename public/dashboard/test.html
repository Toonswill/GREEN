<!DOCTYPE html>
<html>
<head>
    <title>Ener2Crowd API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #1a7f4b; color: white; border: none; border-radius: 5px; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto; }
        .success { color: green; }
        .error { color: red; }
        input { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>🔌 Ener2Crowd API Connection Test</h1>
    
    <div style="background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <strong>Server Status:</strong> Check if backend is running on port 3000
    </div>
    
    <button onclick="testProjects()">1. Test Projects API</button>
    <button onclick="testLogin()">2. Test Login</button>
    <button onclick="testMe()">3. Test Auth (requires login first)</button>
    
    <h3>Result:</h3>
    <pre id="result">Click a button to test...</pre>
    
    <hr>
    
    <h3>Login Form (if needed):</h3>
    <input type="email" id="email" placeholder="Email" value="admin@ener2crowd.africa">
    <input type="password" id="password" placeholder="Password" value="Admin123!">
    <button onclick="doLogin()">Login</button>
    <button onclick="clearStorage()">Clear Saved Data</button>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        async function testProjects() {
            const result = document.getElementById('result');
            result.innerHTML = '⏳ Testing connection to /api/projects...';
            
            try {
                const response = await fetch(`${API_URL}/projects`);
                const data = await response.json();
                result.innerHTML = `✅ SUCCESS! Backend is running.\n\nResponse:\n${JSON.stringify(data, null, 2)}`;
                result.style.color = 'green';
            } catch (error) {
                result.innerHTML = `❌ ERROR: ${error.message}\n\nMake sure:\n1. Server is running (npm run dev)\n2. Port is 3000\n3. No firewall blocking`;
                result.style.color = 'red';
            }
        }
        
        async function testLogin() {
            const result = document.getElementById('result');
            result.innerHTML = '⏳ Testing login...';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@ener2crowd.africa',
                        password: 'Admin123!'
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('test_token', data.token);
                    result.innerHTML = `✅ LOGIN SUCCESSFUL!\n\nToken saved.\n\nUser Info:\n${JSON.stringify(data.user, null, 2)}`;
                    result.style.color = 'green';
                } else {
                    result.innerHTML = `❌ Login failed: ${data.error}`;
                    result.style.color = 'red';
                }
            } catch (error) {
                result.innerHTML = `❌ ERROR: ${error.message}\n\nMake sure server is running on port 3000`;
                result.style.color = 'red';
            }
        }
        
        async function testMe() {
            const token = localStorage.getItem('test_token');
            if (!token) {
                document.getElementById('result').innerHTML = '❌ No token found. Please click "Test Login" first.';
                return;
            }
            
            const result = document.getElementById('result');
            result.innerHTML = '⏳ Verifying token...';
            
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `✅ TOKEN VALID!\n\nUser:\n${JSON.stringify(data.user, null, 2)}`;
                    result.style.color = 'green';
                } else {
                    result.innerHTML = `❌ Token invalid: ${data.error}`;
                    result.style.color = 'red';
                }
            } catch (error) {
                result.innerHTML = `❌ ERROR: ${error.message}`;
                result.style.color = 'red';
            }
        }
        
        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('test_token', data.token);
                    result.innerHTML = `✅ Logged in as ${data.user.email}\n\nToken saved! You can now test authenticated endpoints.`;
                    result.style.color = 'green';
                } else {
                    result.innerHTML = `❌ ${data.error}`;
                    result.style.color = 'red';
                }
            } catch (error) {
                result.innerHTML = `❌ ${error.message}`;
                result.style.color = 'red';
            }
        }
        
        function clearStorage() {
            localStorage.removeItem('test_token');
            document.getElementById('result').innerHTML = 'Saved data cleared.';
            document.getElementById('result').style.color = 'black';
        }
    </script>
</body>
</html>
