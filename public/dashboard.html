<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIN | Green Africa Investment Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7f6 0%, #e8edea 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 230, 118, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 36px;
            color: #0a2e24;
        }

        .logo span {
            color: #00e676;
        }

        .logo p {
            font-size: 13px;
            color: #6c7a73;
            margin-top: 4px;
        }

        .registered-text {
            text-align: center;
            margin-bottom: 28px;
        }

        .registered-text h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a2e24;
            margin-bottom: 6px;
        }

        .registered-text p {
            font-size: 13px;
            color: #6c7a73;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4a5568;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #00e676;
        }

        .btn-login {
            width: 100%;
            background: #0a2e24;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
        }

        .btn-login:hover {
            background: #144d3e;
        }

        .register-link {
            text-align: center;
            font-size: 13px;
            color: #6c7a73;
        }

        .register-link a {
            color: #00e676;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fee;
            border: 1px solid #e74c3c;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #c0392b;
            text-align: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>GAIN<span>.</span></h1>
                <p>Green Africa Investment Network</p>
            </div>

            <div class="registered-text">
                <h2>Already registered?</h2>
                <p>Login with your credentials</p>
            </div>

            <div id="error-message" style="display: none;" class="error-message"></div>

            <form id="login-form">
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="email" placeholder="E-Mail">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Password">
                </div>

                <button type="submit" class="btn-login" id="loginBtn">LOGIN</button>
            </form>

            <div class="register-link">
                Don't you have an account? <a href="signup.html">Register</a>
            </div>
        </div>
    </div>

    <script>
        // ✅ HARDCODED for production - THIS WILL WORK
        const API_URL = 'https://green-ztje.onrender.com/api';
        console.log('🚀 API_URL is:', API_URL);

        const loginForm = document.getElementById('login-form');
        const errorDiv = document.getElementById('error-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            errorDiv.style.display = 'none';
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> LOGGING IN...';
            
            try {
                console.log('Calling API:', `${API_URL}/auth/login`);
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'Invalid email or password';
                    errorDiv.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'LOGIN';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Cannot connect to server: ' + error.message;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'LOGIN';
            }
        });
    </script>
</body>
</html>
